      <h2>Events Calendar</h2>

      <style>
        .responsiveCal {
          position: relative;
          padding-bottom: 75%;
          height: 0;
          overflow: hidden;
          max-width: 800px;
        }

        .responsiveCal iframe {
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          max-height: 750px;
        }

        @media all and (min-width: 768px) {
          .deskContent {
            display: block;
          }
          .phoneContent {
            display: none;
          }
        }

        @media all and (max-width: 767px) {
          .deskContent {
            display: none;
          }
